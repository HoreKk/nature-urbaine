services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nature-urbaine
    ports:
      - "5434:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  maildev:
    image: maildev/maildev:2.2.1
    ports:
      - "1080:1080"
      - "1025:1025"

volumes:
  db-data:
